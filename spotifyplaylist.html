<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Music Playlists</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(120deg, #151515 0%, #18181b 100%);
      color: #eee;
      min-height: 100vh;
    }
    h1 {
      color: #1db954;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 1px 12px #1db95445;
    }
    .playlist-card {
      background: #1a1a1a;
      border: none;
      border-radius: 18px;
      transition: box-shadow 0.25s, transform 0.25s;
      overflow: hidden;
      color: #eee;
      cursor: pointer;
    }
    .playlist-card:hover {
      box-shadow: 0 0 24px #1db95488, 0 5px 16px #000a;
      transform: scale(1.04) translateY(-2px);
    }
    .playlist-cover {
      max-width: 100%;
      border-radius: 18px 18px 0 0;
      height: 200px;
      object-fit: cover;
      box-shadow: 0 2px 15px #1db95433;
      border-bottom: 2px solid #232323;
    }
    .card-title {
      color: #1db954;
      font-weight: 600;
      font-size: 1.25rem;
    }
    /* Playlist Detail Card */
    #playlistDetail {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 70vh;
      padding-bottom: 30px;
    }
    .playlist-detail-card {
      background: #181818;
      border-radius: 18px;
      box-shadow: 0 8px 30px #1db95455, 0 1.5px 8px #000;
      max-width: 600px;
      margin-top: 32px;
      width: 100%;
      color: #eee;
      padding: 2.5rem 2rem 2rem 2rem;
      border: 1px solid #232323;
    }
    .playlist-detail-cover {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 2px 18px #1db95444, 0 0 10px #111;
      border: 3px solid #232323;
    }
    #playlistName {
      color: #1db954;
      font-weight: 700;
      font-size: 1.6rem;
    }
    #playlistDesc {
      color: #ccc;
      font-size: 1rem;
      margin-top: 4px;
      margin-bottom: 0;
    }
    .list-group-item.song-list-item {
      background: transparent;
      color: #eee;
      border: none;
      border-radius: 8px;
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background 0.22s, color 0.22s;
      font-weight: 500;
      font-size: 1.07rem;
      letter-spacing: 0.01em;
      position: relative;
    }
    .list-group-item.song-list-item:hover {
      background: #1db95422;
      color: #1db954;
      cursor: pointer;
      box-shadow: 0 0 8px #1db95433 inset;
    }
    .song-favicon {
      font-size: 1.23em;
      color: #1db954d9;
      margin-right: 8px;
      flex-shrink: 0;
      vertical-align: middle;
    }
    .song-duration {
      margin-left: auto;
      font-size: 0.93em;
      color: #c1c1c1;
      background: #232323;
      border-radius: 6px;
      padding: 2px 10px;
      font-family: "Roboto Mono", "Consolas", monospace;
      letter-spacing: 0.03em;
      font-weight: 400;
      box-shadow: 0 0 5px #1db95422;
    }
    /* Responsive tweaks */
    @media (max-width: 768px) {
      .playlist-detail-card { padding: 1rem; }
      .playlist-detail-cover { width: 75px; height: 75px; }
      #playlistName { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

<div class="container my-5">

  <h1 class="mb-4">Available Playlists</h1>

  <div class="row" id="playlistGrid">
    <!-- Playlist cards -->
    <div class="col-md-3 mb-4">
      <div class="card playlist-card" onclick="showPlaylistDetail('phonks')">
        <img src="https://images.unsplash.com/photo-1540206395-68808572332f" alt="Phonks Playlist" class="playlist-cover" />
        <div class="card-body">
          <h5 class="card-title">Phonks</h5>
          <p>Chill beats and lo-fi vibes.</p>
        </div>
      </div>
    </div>
    <div class="col-md-3 mb-4">
      <div class="card playlist-card" onclick="showPlaylistDetail('sad')">
        <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4" alt="Sad Playlist" class="playlist-cover" />
        <div class="card-body">
          <h5 class="card-title">Sad</h5>
          <p>Melancholic and emotional tracks.</p>
        </div>
      </div>
    </div>
    <div class="col-md-3 mb-4">
      <div class="card playlist-card" onclick="showPlaylistDetail('riding')">
        <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d" alt="Riding Playlist" class="playlist-cover" />
        <div class="card-body">
          <h5 class="card-title">Riding</h5>
          <p>Perfect road trip tunes.</p>
        </div>
      </div>
    </div>
    <div class="col-md-3 mb-4">
      <div class="card playlist-card" onclick="showPlaylistDetail('motivation')">
        <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d" alt="Motivation Playlist" class="playlist-cover" />
        <div class="card-body">
          <h5 class="card-title">Motivation</h5>
          <p>Energetic and uplifting songs.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Playlist Details Section -->
  <div id="playlistDetail" style="display:none;">
    <div class="playlist-detail-card p-4 mx-auto">
      <button class="btn btn-sm btn-outline-light mb-3" onclick="hidePlaylistDetail()">
        &larr; Back to Playlists
      </button>
      <div class="d-flex align-items-center mb-4">
        <img id="playlistImage" src="" alt="Playlist cover" class="playlist-detail-cover me-4" />
        <div>
          <h2 id="playlistName" class="mb-2"></h2>
          <p id="playlistDesc" class="mb-0"></p>
        </div>
      </div>
      <ul id="songList" class="list-group mb-4"></ul>
      <audio controls id="audioPlayer" style="width: 100%; border-radius: 10px; box-shadow: 0 2px 12px #1db95433;">
        <source id="audioSource" src="" type="audio/mpeg" />
        Your browser does not support the audio element.
      </audio>
    </div>
  </div>

</div>

<script>
  const playlists = {
    phonks: {
      name: "Phonks",
      description: "Chill beats and lo-fi vibes.",
      songs: [
        {title: "Chillhop Breeze", url: "https://cdn.pixabay.com/download/audio/2021/03/11/audio_2ae717d0c6.mp3?filename=pop-rock-2011-12418.mp3", duration: "3:27"},
        {title: "Late Night Study", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", duration: "5:12"},
        {title: "Smooth Jazz Loops", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", duration: "4:18"}
      ]
    },
    sad: {
      name: "Sad",
      description: "Melancholic and emotional tracks.",
      songs: [
        {title: "Lost Memories", url: "https://cdn.pixabay.com/download/audio/2021/09/16/audio_25c84a025e.mp3?filename=retro-beat-6157.mp3", duration: "3:03"},
        {title: "Lonely Nights", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", duration: "4:27"},
        {title: "Tears Falling", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", duration: "5:01"}
      ]
    },
    riding: {
      name: "Riding",
      description: "Perfect road trip tunes.",
      songs: [
        {title: "Open Road", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", duration: "4:00"},
        {title: "Sunset Drive", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3", duration: "4:35"},
        {title: "Highway Chill", url: "https://cdn.pixabay.com/download/audio/2021/03/11/audio_2ae717d0c6.mp3?filename=pop-rock-2011-12418.mp3", duration: "3:45"}
      ]
    },
    motivation: {
      name: "Motivation",
      description: "Energetic and uplifting songs.",
      songs: [
        {title: "Rise Up", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", duration: "5:02"},
        {title: "Push Forward", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", duration: "4:10"},
        {title: "Victory Dance", url: "https://cdn.pixabay.com/download/audio/2021/09/16/audio_25c84a025e.mp3?filename=retro-beat-6157.mp3", duration: "3:58"}
      ]
    }
  };
  // Each playlist's cover image
  const playlistImages = {
    phonks: "https://images.unsplash.com/photo-1540206395-68808572332f",
    sad: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4",
    riding: "https://images.unsplash.com/photo-1504384308090-c894fdcc538d",
    motivation: "https://images.unsplash.com/photo-1504384308090-c894fdcc538d"
  };

  const playlistGrid = document.getElementById('playlistGrid');
  const playlistDetail = document.getElementById('playlistDetail');
  const playlistImage = document.getElementById('playlistImage');
  const playlistName = document.getElementById('playlistName');
  const playlistDesc = document.getElementById('playlistDesc');
  const songList = document.getElementById('songList');
  const audioPlayer = document.getElementById('audioPlayer');
  const audioSource = document.getElementById('audioSource');

  function showPlaylistDetail(id) {
    const playlist = playlists[id];
    if (!playlist) return;
    playlistGrid.style.display = 'none';
    playlistDetail.style.display = 'flex';
    playlistImage.src = playlistImages[id];
    playlistName.textContent = playlist.name;
    playlistDesc.textContent = playlist.description;

    songList.innerHTML = '';
    playlist.songs.forEach(song => {
      const li = document.createElement('li');
      li.classList.add('list-group-item', 'song-list-item');
      li.innerHTML = `<span class="song-favicon">&#9835;</span> ${song.title} <span class="song-duration">${song.duration}</span>`;
      songList.appendChild(li);
    });

    audioSource.src = playlist.songs[0].url; // Play first song as sample
    audioPlayer.load();
  }

  function hidePlaylistDetail() {
    playlistDetail.style.display = 'none';
    playlistGrid.style.display = 'flex';
    audioPlayer.pause();
    audioPlayer.currentTime = 0;
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
